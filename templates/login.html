<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>UX-PRINT // AUTH - 使用者登入與帳號註冊</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,800;1,900&family=Hanken+Grotesk:wght@400;700&family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-dim": "#131313",
            "background": "#131313",
            "primary-fixed": "#c3f400",
            "on-primary-fixed": "#161e00",
            "secondary-container": "#fe6b00",
            "surface-container": "#201f1f",
            "surface-container-high": "#2a2a2a",
            "surface-container-low": "#1c1b1b",
            "outline-variant": "#444933",
            "line-green": "#06C755"
          },
          fontFamily: {
            "body-md": ["Hanken Grotesk", "Noto Sans TC", "sans-serif"],
            "label-caps": ["JetBrains Mono", "monospace"],
            "display-lg": ["Anybody", "Noto Sans TC", "sans-serif"]
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #131313;
      background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
      background-size: 32px 32px;
      color: #e5e2e1;
    }
    .scanline {
      position: relative;
      overflow: hidden;
    }
    .scanline::after {
      content: "";
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(195, 244, 0, 0.15), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0% { top: -100%; }
      100% { top: 100%; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">

  <!-- Top Nav Simple Header -->
  <header class="p-4 md:px-12 border-b border-outline-variant bg-background/90 backdrop-blur-md flex justify-between items-center">
    <a href="/" class="font-display-lg text-2xl italic font-black text-primary-fixed border-b-4 border-secondary-container">
      UX-PRINT <span class="text-xs text-white not-italic font-label-caps bg-surface-container px-1.5 py-0.5 border border-outline-variant">AUTH CENTER</span>
    </a>
    <a href="/" class="text-xs font-label-caps text-on-surface-variant hover:text-primary-fixed flex items-center gap-1">
      <span class="material-symbols-outlined text-sm">arrow_back</span> 返回首頁
    </a>
  </header>

  <!-- Login/Register Card Container -->
  <main class="flex-grow flex items-center justify-center p-4 my-6">
    <div class="w-full max-w-md bg-surface-container-low border-2 border-primary-fixed p-6 md:p-8 scanline shadow-[0_0_30px_rgba(195,244,0,0.15)] relative">
      
      <div class="text-center mb-6">
        <span class="font-label-caps text-xs text-primary-fixed font-bold tracking-widest block mb-1">SYSTEM_AUTH // 身份驗證與會員中心</span>
        <h1 id="auth-title" class="font-display-lg text-2xl italic font-black text-white">UX-PRINT AUTHENTICATION</h1>
        <p class="text-xs text-on-surface-variant mt-1">選擇一般登入、建立新帳號或 LINE 一鍵授權</p>
      </div>

      <!-- Auth Method Tabs (三個分頁: 帳密登入 / 帳號註冊 / LINE登入) -->
      <div class="flex border-b border-outline-variant mb-6 font-label-caps text-xs">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 font-bold italic uppercase border-b-2 border-primary-fixed text-primary-fixed transition-colors">
          帳密登入
        </button>
        <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-secondary-container transition-colors">
          註冊新帳號
        </button>
        <button id="tab-line" onclick="switchTab('line')" class="flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-line-green transition-colors flex items-center justify-center gap-1">
          <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.82 2 10.5c0 3.32 2.27 6.22 5.67 7.5-.23.83-.84 3.03-.96 3.48-.15.56.2.55.43.4.18-.12 2.87-1.95 4.04-2.75.92.17 1.86.27 2.82.27 5.52 0 10-3.82 10-8.5S17.52 2 12 2z"/></svg>
          LINE 登入
        </button>
      </div>

      <!-- Tab 1: Password Login (帳密登入) -->
      <div id="form-login" class="space-y-4">
        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">帳號 (USERNAME)</label>
          <input type="text" id="login-username" placeholder="請輸入帳號" class="w-full bg-surface-container border border-outline-variant focus:border-primary-fixed text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">密碼 (PASSWORD)</label>
          <input type="password" id="login-password" placeholder="請輸入密碼" class="w-full bg-surface-container border border-outline-variant focus:border-primary-fixed text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div class="p-2 bg-surface-container text-[11px] text-on-surface-variant font-label-caps border border-outline-variant/60 space-y-1">
          <div>👑 管理員：<span class="text-primary-fixed font-bold">admin</span> / <span class="text-primary-fixed font-bold">admin123</span></div>
          <div>🧢 助理教練：<span class="text-secondary-container font-bold">coach1</span> / <span class="text-secondary-container font-bold">coach123</span></div>
          <div>🏃 一般使用者：<span class="text-white font-bold">alex88</span> / <span class="text-white font-bold">123456</span></div>
        </div>

        <button onclick="handlePasswordLogin()" class="w-full bg-primary-fixed text-on-primary-fixed py-3 font-label-caps font-black italic uppercase hover:shadow-[0_0_15px_rgba(195,244,0,0.5)] transition-all flex items-center justify-center gap-2 text-sm">
          <span class="material-symbols-outlined text-base">login</span> 登入系統
        </button>
      </div>

      <!-- Tab 2: User Registration (使用者註冊功能) -->
      <div id="form-register" class="hidden space-y-3">
        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">姓名 / 暱稱 (FULL NAME) *</label>
          <input type="text" id="reg-name" placeholder="請輸入您的姓名或選手暱稱" class="w-full bg-surface-container border border-outline-variant focus:border-secondary-container text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">帳號 (USERNAME) *</label>
          <input type="text" id="reg-username" placeholder="請設定登入帳號 (例如: player01)" class="w-full bg-surface-container border border-outline-variant focus:border-secondary-container text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">密碼 *</label>
            <input type="password" id="reg-password" placeholder="請設定密碼" class="w-full bg-surface-container border border-outline-variant focus:border-secondary-container text-white font-label-caps text-xs p-2.5 outline-none"/>
          </div>
          <div>
            <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">確認密碼 *</label>
            <input type="password" id="reg-confirm-password" placeholder="再次輸入密碼" class="w-full bg-surface-container border border-outline-variant focus:border-secondary-container text-white font-label-caps text-xs p-2.5 outline-none"/>
          </div>
        </div>

        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">聯絡電話 (PHONE)</label>
          <input type="text" id="reg-phone" placeholder="例如: 0912345678" class="w-full bg-surface-container border border-outline-variant focus:border-secondary-container text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">申請使用者角色 (ROLE)</label>
          <select id="reg-role" class="w-full bg-surface-container border border-outline-variant text-white font-label-caps text-xs p-2.5 outline-none">
            <option value="user">一般使用者 (一般會員購物與查看公告)</option>
            <option value="assistant_coach">助理教練 (公告發布、LINE訊息與學員檢視)</option>
            <option value="admin">管理員 (全功能系統控制權限)</option>
          </select>
        </div>

        <button onclick="handleRegisterSubmit()" class="w-full bg-secondary-container text-white py-3 font-label-caps font-black italic uppercase hover:shadow-[0_0_15px_rgba(254,107,0,0.5)] transition-all flex items-center justify-center gap-2 text-sm mt-2">
          <span class="material-symbols-outlined text-base">how_to_reg</span> 完成註冊並登入
        </button>
      </div>

      <!-- Tab 3: LINE Login -->
      <div id="form-line" class="hidden space-y-4 text-center">
        <div class="w-14 h-14 bg-line-green/20 rounded-full flex items-center justify-center mx-auto text-line-green mb-2">
          <svg class="w-9 h-9 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.82 2 10.5c0 3.32 2.27 6.22 5.67 7.5-.23.83-.84 3.03-.96 3.48-.15.56.2.55.43.4.18-.12 2.87-1.95 4.04-2.75.92.17 1.86.27 2.82.27 5.52 0 10-3.82 10-8.5S17.52 2 12 2z"/></svg>
        </div>
        <p class="text-xs text-on-surface-variant leading-relaxed">
          透過 LINE 帳號快速驗證身份。<br/>
          系統將帶入您的 LINE 暱稱與大頭貼，並自動同步社團群組權限。
        </p>

        <button onclick="handleLineLogin()" class="w-full bg-line-green text-white py-3 font-label-caps font-bold italic uppercase hover:shadow-[0_0_20px_rgba(6,199,85,0.6)] transition-all flex items-center justify-center gap-2">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.82 2 10.5c0 3.32 2.27 6.22 5.67 7.5-.23.83-.84 3.03-.96 3.48-.15.56.2.55.43.4.18-.12 2.87-1.95 4.04-2.75.92.17 1.86.27 2.82.27 5.52 0 10-3.82 10-8.5S17.52 2 12 2z"/></svg>
          授權 LINE 帳號登入
        </button>
      </div>

    </div>
  </main>

  <footer class="p-4 text-center font-label-caps text-[10px] text-on-surface-variant border-t border-outline-variant">
    © 2026 UX-PRINT // ALL RIGHTS RESERVED
  </footer>

  <script>
    function switchTab(tab) {
      const tabLogin = document.getElementById('tab-login');
      const tabReg = document.getElementById('tab-register');
      const tabLine = document.getElementById('tab-line');

      const formLogin = document.getElementById('form-login');
      const formReg = document.getElementById('form-register');
      const formLine = document.getElementById('form-line');

      // Reset tabs
      tabLogin.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-primary-fixed transition-colors";
      tabReg.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-secondary-container transition-colors";
      tabLine.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-line-green transition-colors flex items-center justify-center gap-1";

      formLogin.classList.add('hidden');
      formReg.classList.add('hidden');
      formLine.classList.add('hidden');

      if (tab === 'login') {
        tabLogin.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-primary-fixed text-primary-fixed transition-colors";
        formLogin.classList.remove('hidden');
      } else if (tab === 'register') {
        tabReg.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-secondary-container text-secondary-container transition-colors";
        formReg.classList.remove('hidden');
      } else {
        tabLine.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-line-green text-line-green transition-colors flex items-center justify-center gap-1";
        formLine.classList.remove('hidden');
      }
    }

    async function handlePasswordLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();

      if (!username || !password) {
        alert('請輸入帳號與密碼！');
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ username, password })
        });
        const json = await res.json();
        if (json.status === 'success') {
          const roleMap = { admin: '管理員', assistant_coach: '助理教練', user: '一般使用者' };
          alert(`歡迎回來，${json.user.name}（${roleMap[json.user.role] || json.user.role}）！`);
          
          if (json.user.role === 'admin' || json.user.role === 'assistant_coach') {
            window.location.href = '/admin';
          } else {
            window.location.href = '/';
          }
        } else {
          alert(json.message || '登入失敗');
        }
      } catch (e) {
        console.error(e);
        alert('登入連線失敗');
      }
    }

    async function handleRegisterSubmit() {
      const name = document.getElementById('reg-name').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      const confirmPassword = document.getElementById('reg-confirm-password').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();
      const role = document.getElementById('reg-role').value;

      if (!name || !username || !password) {
        alert('請填寫姓名、帳號與密碼必填欄位！');
        return;
      }

      if (password !== confirmPassword) {
        alert('兩次輸入的密碼不相符，請重新確認！');
        return;
      }

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, username, password, phone, role })
        });
        const json = await res.json();
        if (json.status === 'success') {
          alert('🎉 ' + json.message + '\n即刻為您進行登入...');
          // 自動登入
          document.getElementById('login-username').value = username;
          document.getElementById('login-password').value = password;
          handlePasswordLogin();
        } else {
          alert(json.message || '註冊失敗');
        }
      } catch (e) {
        console.error(e);
        alert('註冊連線失敗');
      }
    }

    async function handleLineLogin() {
      try {
        const res = await fetch('/api/line/login-url');
        const json = await res.json();
        if (json.status === 'success' && json.url) {
          window.location.href = json.url;
        } else {
          simulateLineLoginFallback();
        }
      } catch (e) {
        simulateLineLoginFallback();
      }
    }

    function simulateLineLoginFallback() {
      alert('[LINE OAuth 登入成功]\n以預設 LINE 帳號登入系統！');
      window.location.href = '/';
    }
  </script>
</body>
</html>
