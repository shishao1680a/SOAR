<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>UX-PRINT // LOGIN - 社團與管理員登入</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700;1,800;1,900&family=Hanken+Grotesk:wght@400;700&family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-dim": "#131313",
            "background": "#131313",
            "primary-fixed": "#c3f400",
            "on-primary-fixed": "#161e00",
            "secondary-container": "#fe6b00",
            "surface-container": "#201f1f",
            "surface-container-high": "#2a2a2a",
            "surface-container-low": "#1c1b1b",
            "outline-variant": "#444933",
            "line-green": "#06C755"
          },
          fontFamily: {
            "body-md": ["Hanken Grotesk", "Noto Sans TC", "sans-serif"],
            "label-caps": ["JetBrains Mono", "monospace"],
            "display-lg": ["Anybody", "Noto Sans TC", "sans-serif"]
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #131313;
      background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
      background-size: 32px 32px;
      color: #e5e2e1;
    }
    .scanline {
      position: relative;
      overflow: hidden;
    }
    .scanline::after {
      content: "";
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(195, 244, 0, 0.15), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0% { top: -100%; }
      100% { top: 100%; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">

  <!-- Top Nav Simple Header -->
  <header class="p-4 md:px-12 border-b border-outline-variant bg-background/90 backdrop-blur-md flex justify-between items-center">
    <a href="/" class="font-display-lg text-2xl italic font-black text-primary-fixed border-b-4 border-secondary-container">
      UX-PRINT <span class="text-xs text-white not-italic font-label-caps bg-surface-container px-1.5 py-0.5 border border-outline-variant">CLUB LOGIN</span>
    </a>
    <a href="/" class="text-xs font-label-caps text-on-surface-variant hover:text-primary-fixed flex items-center gap-1">
      <span class="material-symbols-outlined text-sm">arrow_back</span> 返回首頁
    </a>
  </header>

  <!-- Login Card Container -->
  <main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-surface-container-low border-2 border-primary-fixed p-6 md:p-8 scanline shadow-[0_0_30px_rgba(195,244,0,0.15)] relative">
      
      <div class="text-center mb-6">
        <span class="font-label-caps text-xs text-primary-fixed font-bold tracking-widest block mb-1">SYSTEM_AUTH // 身份驗證中心</span>
        <h1 class="font-display-lg text-2xl italic font-black text-white">LOGIN TO UX-PRINT</h1>
        <p class="text-xs text-on-surface-variant mt-1">選擇一般帳號密碼登入或 LINE 帳號授權</p>
      </div>

      <!-- Auth Method Tabs -->
      <div class="flex border-b border-outline-variant mb-6 font-label-caps text-xs">
        <button id="tab-password" onclick="switchLoginTab('password')" class="flex-1 py-2 font-bold italic uppercase border-b-2 border-primary-fixed text-primary-fixed transition-colors">
          一般帳密登入
        </button>
        <button id="tab-line" onclick="switchLoginTab('line')" class="flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-line-green transition-colors flex items-center justify-center gap-1">
          <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.82 2 10.5c0 3.32 2.27 6.22 5.67 7.5-.23.83-.84 3.03-.96 3.48-.15.56.2.55.43.4.18-.12 2.87-1.95 4.04-2.75.92.17 1.86.27 2.82.27 5.52 0 10-3.82 10-8.5S17.52 2 12 2z"/></svg>
          LINE 一鍵登入
        </button>
      </div>

      <!-- Form 1: Password Login -->
      <div id="form-password" class="space-y-4">
        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">帳號 (USERNAME)</label>
          <input type="text" id="login-username" placeholder="請輸入帳號 (例如: admin)" class="w-full bg-surface-container border border-outline-variant focus:border-primary-fixed text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div>
          <label class="block font-label-caps text-xs text-on-surface-variant mb-1 font-bold">密碼 (PASSWORD)</label>
          <input type="password" id="login-password" placeholder="請輸入密碼 (預設: admin123)" class="w-full bg-surface-container border border-outline-variant focus:border-primary-fixed text-white font-label-caps text-xs p-2.5 outline-none"/>
        </div>

        <div class="p-2 bg-surface-container text-[11px] text-on-surface-variant font-label-caps border border-outline-variant/60">
          💡 管理員測試帳號：<span class="text-primary-fixed font-bold">admin</span> / 密碼：<span class="text-primary-fixed font-bold">admin123</span>
        </div>

        <button onclick="handlePasswordLogin()" class="w-full bg-primary-fixed text-on-primary-fixed py-3 font-label-caps font-black italic uppercase hover:shadow-[0_0_15px_rgba(195,244,0,0.5)] transition-all flex items-center justify-center gap-2 text-sm">
          <span class="material-symbols-outlined text-base">login</span> 登入系統
        </button>
      </div>

      <!-- Form 2: LINE Login -->
      <div id="form-line" class="hidden space-y-4 text-center">
        <div class="w-14 h-14 bg-line-green/20 rounded-full flex items-center justify-center mx-auto text-line-green mb-2">
          <svg class="w-9 h-9 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.82 2 10.5c0 3.32 2.27 6.22 5.67 7.5-.23.83-.84 3.03-.96 3.48-.15.56.2.55.43.4.18-.12 2.87-1.95 4.04-2.75.92.17 1.86.27 2.82.27 5.52 0 10-3.82 10-8.5S17.52 2 12 2z"/></svg>
        </div>
        <p class="text-xs text-on-surface-variant leading-relaxed">
          透過 LINE 帳號快速驗證身份。<br/>
          系統將帶入您的 LINE 暱稱與大頭貼，並自動同步社團群組權限。
        </p>

        <button onclick="handleLineLogin()" class="w-full bg-line-green text-white py-3 font-label-caps font-bold italic uppercase hover:shadow-[0_0_20px_rgba(6,199,85,0.6)] transition-all flex items-center justify-center gap-2">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.82 2 10.5c0 3.32 2.27 6.22 5.67 7.5-.23.83-.84 3.03-.96 3.48-.15.56.2.55.43.4.18-.12 2.87-1.95 4.04-2.75.92.17 1.86.27 2.82.27 5.52 0 10-3.82 10-8.5S17.52 2 12 2z"/></svg>
          授權 LINE 帳號登入
        </button>
      </div>

    </div>
  </main>

  <footer class="p-4 text-center font-label-caps text-[10px] text-on-surface-variant border-t border-outline-variant">
    © 2026 UX-PRINT // ALL RIGHTS RESERVED
  </footer>

  <script>
    function switchLoginTab(tab) {
      const tabPw = document.getElementById('tab-password');
      const tabLine = document.getElementById('tab-line');
      const formPw = document.getElementById('form-password');
      const formLine = document.getElementById('form-line');

      if (tab === 'password') {
        tabPw.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-primary-fixed text-primary-fixed transition-colors";
        tabLine.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-line-green transition-colors flex items-center justify-center gap-1";
        formPw.classList.remove('hidden');
        formLine.classList.add('hidden');
      } else {
        tabLine.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-line-green text-line-green transition-colors flex items-center justify-center gap-1";
        tabPw.className = "flex-1 py-2 font-bold italic uppercase border-b-2 border-transparent text-on-surface-variant hover:text-primary-fixed transition-colors";
        formLine.classList.remove('hidden');
        formPw.classList.add('hidden');
      }
    }

    async function handlePasswordLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();

      if (!username || !password) {
        alert('請輸入帳號與密碼！');
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ username, password })
        });
        const json = await res.json();
        if (json.status === 'success') {
          alert(`歡迎回來，${json.user.name}！`);
          if (json.user.role === 'admin') {
            window.location.href = '/admin';
          } else {
            window.location.href = '/';
          }
        } else {
          alert(json.message || '登入失敗');
        }
      } catch (e) {
        console.error(e);
        alert('登入網路連線異常');
      }
    }

    async function handleLineLogin() {
      // 嘗試向 API 取得 LINE 授權網址或直接模擬登入
      try {
        const res = await fetch('/api/line/login-url');
        const json = await res.json();
        if (json.status === 'success' && json.url) {
          window.location.href = json.url;
        } else {
          simulateLineLoginFallback();
        }
      } catch (e) {
        simulateLineLoginFallback();
      }
    }

    function simulateLineLoginFallback() {
      alert('[LINE OAuth 登入成功]\n以預設 LINE 帳號登入系統！');
      window.location.href = '/';
    }
  </script>
</body>
</html>
